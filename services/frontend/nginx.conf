server {
    listen 5173;   # same port as the vite dev server, so the container port is identical local↔prod
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths serve index.html (so client routes 200, not 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
