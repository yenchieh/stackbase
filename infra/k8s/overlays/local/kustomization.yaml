apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Knob #1: the project namespace (renames the Namespace object + stamps all resources).
namespace: stackbase

resources:
  - ../../base

# Local images: :dev tags in the MicroK8s registry. Tilt matches these names,
# rebuilds, and overrides the tag with its own content hash.
images:
  - name: stackbase-api
    newName: localhost:32000/stackbase-api
    newTag: dev
  - name: stackbase-frontend
    newName: localhost:32000/stackbase-frontend
    newTag: dev

# Dev-only: the api pod runs the CompileDaemon image and rebuilds in-pod on every
# .go save. `go build` needs far more memory than the tiny runtime — raise the
# limit so the compile doesn't get OOMKilled (prod keeps the lean base limit).
patches:
  - target:
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
