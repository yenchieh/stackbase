apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: the `migrations` ConfigMap is intentionally NOT here — it is generated
# from a GLOB over db/migrations (`make migrate` / the Tiltfile), never a static
# file list. See migrate-job.yaml.
resources:
  - namespace.yaml
  - postgres.yaml
  - migrate-job.yaml
  - api.yaml
  - frontend.yaml
  - ingressroute.yaml
