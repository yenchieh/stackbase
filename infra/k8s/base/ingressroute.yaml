# The only routing a project ships. The shared Traefik (ns ingress) picks this
# up cross-namespace. `<name>.test` is the second adopter knob — change it here.
#   /api/*  -> api  (strip the /api prefix so the Go api sees /healthz, /me)
#   /*      -> frontend
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
spec:
  stripPrefix:
    prefixes:
      - /api
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: stackbase
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`stackbase.test`) && PathPrefix(`/api`)
      kind: Rule
      middlewares:
        - name: strip-api
      services:
        - name: api
          port: 8080
    - match: Host(`stackbase.test`)
      kind: Rule
      services:
        - name: frontend
          port: 80
